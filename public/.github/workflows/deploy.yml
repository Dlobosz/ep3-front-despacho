name: CI/CD Frontend EP2

on:
  push:
    [cite_start]branches: [ "deploy" ] # Gatillador exigido por la rúbrica [cite: 44, 113]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Login en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y Push de la imagen Docker
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/front_despacho:latest

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Despliegue en Amazon Linux 2023
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/front_despacho:latest
            docker stop front_despacho || true
            docker rm front_despacho || true
            docker run -d --name front_despacho -p 80:80 ${{ secrets.DOCKER_USERNAME }}/front_despacho:latest
            